name: fyp_new_project
description: "AI Based Expense Analyzer"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # Google Sign In
  google_sign_in: ^6.2.1

  # Google ML Kit OCR
  google_mlkit_text_recognition: ^0.15.1

  # Image Picker
  image_picker: ^1.1.2

  # Charts
  fl_chart: ^0.69.0

  # Intl for date formatting
  intl: ^0.19.0

  # UUID
  uuid: ^4.5.1

  # Shared Preferences (for budget storage)
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
